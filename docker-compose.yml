services:
  breadbot:
    # Built with ko (no Dockerfile). Build the locally-tagged image first:
    #   KO_DOCKER_REPO=ko.local ko build --bare -t compose ./cmd/breadbot
    # which loads ko.local:compose into the local docker daemon (referenced
    # below). For a registry deploy, set KO_DOCKER_REPO to your registry and
    # replace this with the pushed image reference that `ko build` prints.
    image: ko.local:compose
    # Run as the host user (not root / the image's nonroot UID) so the
    # bind-mounted DB dir stays writable and owned by you. Defaults to 1000:1000;
    # override by exporting UID/GID (e.g. `UID=$(id -u) GID=$(id -g) docker compose up`).
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      # All writable paths point at the mounted /data volume — the image's /app
      # is root-owned and not writable by the host user, so the DB, downloads,
      # and plots must live on the mount.
      DB_DATA_PATH: /data/dbdata/messages.db
      DOWNLOADS_PATH: /data/downloads
      # Reach the inference service by its compose service name.
      INFERENCE_SERVICE_URL: http://breadvision:8000
      ADMIN_API_ADDR: ":8080"
    volumes:
      - ./.dbdatastuff/:/data
    ports:
      # Read-only stats API + /healthz.
      - "8080:8080"
    depends_on:
      - breadvision
    restart: unless-stopped

  breadvision:
    image: taruelec/breadvision:latest
    env_file:
      - .env
    ports:
      # Read-only stats API + /healthz.
      - "8000:8000"
    restart: unless-stopped
